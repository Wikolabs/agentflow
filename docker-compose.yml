version: "3.9"

# agentflow demo - production-ready POC.
# 2 services orchestrated:
#   - agentflow (Next.js frontend on host port 3039)
#   - agentflow-backend (FastAPI Python, internal only on 8000)
# Shared external network wkdemo-net (created once by deploy.yml) avoids
# Docker default address-pool exhaustion across all 47 LP stacks.

services:
  agentflow-backend:
    image: ghcr.io/wikolabs/agentflow-backend:latest
    container_name: agentflow-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - wkdemo_net

  agentflow:
    image: ghcr.io/wikolabs/agentflow:latest
    container_name: agentflow
    restart: unless-stopped
    ports:
      - "3039:3000"
    environment:
      BACKEND_URL: "http://agentflow-backend:8000"
    depends_on:
      - agentflow-backend
    networks:
      - wkdemo_net

networks:
  wkdemo_net:
    name: wkdemo-net
    external: true
